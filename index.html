<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>3DJV – Velikonoce</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family: Arial, sans-serif;
  background-image: url("cobblestone.png");
  background-repeat: repeat;
  background-size: auto;
  color:#333;
}

}

/* HEADER */
header{
  background:#111;
  color:white;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1{
  font-size:22px;
}

nav a{
  color:white;
  text-decoration:none;
  margin-left:20px;
  font-weight:bold;
}

/* PAGE */
.page{
  max-width:1200px;
  margin:30px auto;
  padding:0 20px;
}

.breadcrumb{
  font-size:14px;
  margin-bottom:20px;
  color:#777;
}

.page-header{
  display:flex;
  justify-content:space-between;
  gap:30px;
  margin-bottom:40px;
}

.page-header h2{
  font-size:32px;
  margin-bottom:10px;
}

.category-image img{
  width:300px;
  border-radius:12px;
}

/* PRODUCTS GRID */
.products{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:25px;
}

/* PRODUCT CARD */
.product{
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  text-align:center;
}

.product img{
  width:380px;        /* cca 10 cm */
  max-width:100%;
  border-radius:8px;
  cursor:pointer;
  margin:0 auto 10px;
  display:block;
}

.product h3{
  margin:10px 0 5px;
}

.price{
  font-weight:bold;
  margin-bottom:10px;
}

.order-btn{
  display:inline-block;
  background:#ff7a00;
  color:white;
  padding:8px 14px;
  border-radius:6px;
  text-decoration:none;
  font-weight:bold;
}

/* LIGHTBOX */
.lightbox{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}

/* FOOTER */
footer{
  background:#111;
  color:white;
  text-align:center;
  padding:15px;
  margin-top:50px;
}

/* RESPONSIVE */
@media(max-width:900px){
  .page-header{
    flex-direction:column;
  }
  .products{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:500px){
  .products{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
  <h1>3DJV</h1>
  <nav>
    <a href="#">Domů</a>
    <a href="#">Velikonoce</a>
  </nav>
</header>

<div class="page">

  <div class="breadcrumb">
    Domů > Velikonoce
  </div>

  <div class="page-header">
    <div>
      <h2>Velikonoce</h2>
      <p>3D tištěné velikonoční dekorace a králíci.</p>
    </div>
    <div class="category-image">
      <img src="kralik.jpg" alt="Velikonoce">
    </div>
  </div>

  <!-- PRODUKTY -->
  <div class="products">

    <div class="product">
      <img src="kralik.jpg" alt="Malý králík" onclick="openLightbox(this.src)">
      <h3>Malý králík</h3>
      <div class="price">35 Kč</div>
      <a class="order-btn" href="mailto:vaskoj@seznam.cz?subject=Objednávka – Malý králík">Objednat</a>
    </div>

    <div class="product">
      <img src="kralik.jpg" alt="Velký králík" onclick="openLightbox(this.src)">
      <h3>Velký králík</h3>
      <div class="price">45 Kč</div>
      <a class="order-btn" href="mailto:vaskoj@seznam.cz?subject=Objednávka – Velký králík">Objednat</a>
    </div>

    <div class="product">
      <img src="kralik.jpg" alt="Králík set" onclick="openLightbox(this.src)">
      <h3>Králík set</h3>
      <div class="price">80 Kč</div>
      <a class="order-btn" href="mailto:vaskoj@seznam.cz?subject=Objednávka – Králík set">Objednat</a>
    </div>

  </div>

</div>

<footer>
  © 2026 3DJV
</footer>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img
