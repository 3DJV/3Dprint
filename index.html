<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DJV</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    margin:0;
    text-align:center;
}

/* Horní menu */
nav{
    background:#222;
    padding:15px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 20px;
    font-weight:bold;
}

nav a:hover{
    color:#ff6a00;
}

/* Header */
header{
    background:#333;
    color:white;
    padding:40px 20px;
}

/* Produktová karta */
.product{
    background:white;
    width:320px;
    margin:40px auto;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.product img{
    width:250px;
    border-radius:10px;
}

/* Tlačítko */
button{
    background:#ff6a00;
    border:none;
    color:white;
    padding:12px 20px;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#e65c00;
}

/* Mobil */
@media (max-width:600px){
    .product{
        width:90%;
    }
}
</style>

</head>

<body>

<!-- MENU -->
<nav>
    <a href="/3Dprint/">Domů</a>
    <a href="/3Dprint/vanoce/">Vánoce</a>
    <a href="/3Dprint/velikonoce/">Velikonoce</a>
</nav>

<header>
<h1>3DJV</h1>
<p>3D tištěné výrobky</p>
</header>

<div class="product">

<img src="kralik.jpg" alt="Velikonoční králík">

<h2>Velikonoční králíci</h2>

<p>Malý králík</p>
<b>35 Kč</b>

<p>Velký králík</p>
<b>45 Kč</b>

<br><br>

<a href="https://www.thingiverse.com" target="_blank">
<button>Model z Thingiverse</button>
</a>

</div>

</body>
</html>
