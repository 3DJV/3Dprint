<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DJV E-SHOP</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
}

/* Horní lišta */
.topbar{
    background:#111;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

.topbar h1{
    margin:0;
    font-size:20px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-weight:bold;
}

nav a:hover{
    color:#ff6a00;
}

/* Vyhledávání */
.search{
    margin:20px;
}

.search input{
    padding:10px;
    width:250px;
    border-radius:8px;
    border:1px solid #ccc;
}

/* Produkty */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    padding:20px;
    max-width:1100px;
    margin:auto;
}

.card{
    background:white;
    padding:15px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    border-radius:10px;
}

.price{
    font-size:18px;
    font-weight:bold;
    color:#ff6a00;
}

button{
    background:#ff6a00;
    border:none;
    color:white;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#e65c00;
}

/* Footer */
footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}
</style>

</head>

<body>

<div class="topbar">
    <h1>🛒 3DJV E-SHOP</h1>
    <nav>
        <a href="/3Dprint/">Domů</a>
        <a href="/3Dprint/vanoce/">Vánoce</a>
        <a href="/3Dprint/velikonoce/">Velikonoce</a>
    </nav>
</div>

<div class="search">
    <input type="text" placeholder="Hledat produkty...">
</div>

<div class="products">

    <div class="card">
        <img src="kralik.jpg" alt="Velikonoční králík">
        <h3>Velikonoční králík</h3>
        <p>Malý dekorativní model</p>
        <p class="price">35 Kč</p>
        <button>Koupit</button>
    </div>

    <div class="card">
        <img src="kralik.jpg" alt="Velikonoční králík velký">
        <h3>Velikonoční králík velký</h3>
        <p>Větší verze modelu</p>
        <p class="price">45 Kč</p>
        <button>Koupit</button>
    </div>

</div>

<footer>
© 2026 3DJV | 3D tisk výrobky
</footer>

</body>
</html>
