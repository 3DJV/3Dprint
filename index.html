<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DJV Shop</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#f5f7fa;
}

/* HEADER */
header{
    background: linear-gradient(90deg,#111,#333);
    color:white;
    padding:25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

header h1{
    margin:0;
}

/* MENU */
nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-weight:500;
}

nav a:hover{
    color:#ff6a00;
}

/* HERO */
.hero{
    text-align:center;
    padding:40px 20px;
}

.hero h2{
    font-size:32px;
}

/* PRODUKTY */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
    padding:30px;
    max-width:1200px;
    margin:auto;
}

.card{
    background:white;
    border-radius:16px;
    padding:15px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-6px);
}

.card img{
    width:100%;
    border-radius:12px;
}

.price{
    color:#ff6a00;
    font-weight:bold;
    font-size:18px;
}

button{
    background:#ff6a00;
    border:none;
    padding:10px 15px;
    color:white;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#e65c00;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    background:#111;
    color:white;
    margin-top:40px;
}
</style>
</head>

<body>

<header>
<h1>🛒 3DJV SHOP</h1>
<nav>
<a href="#">Domů</a>
<a href="admin.html">Admin</a>
<a href="vanoce/">Vánoce</a>
<a href="velikonoce/">Velikonoce</a>
</nav>
</header>

<div class="hero">
<h2>Moderní 3D tištěné produkty</h2>
<p>Kvalitní modely ke stažení i objednání</p>
</div>

<div class="products" id="productList"></div>

<footer>
© 2026 3DJV
</footer>

<script src="products.js"></script>

</body>
</html>
