<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>3DJV Craft</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family: 'Press Start 2P', cursive;
  background-image: url('dirt.png');
  background-repeat: repeat;
  color: #FFF;
  image-rendering: pixelated;
}

/* HEADER & FOOTER */
header, footer{
  background: #363636;
  color: white;
  padding: 20px;
  text-align: center;
  border-top: 4px solid #A8A8A8;
  border-bottom: 4px solid #A8A8A8;
}

/* PAGE */
.page{
  max-width:1200px;
  margin:30px auto;
  padding:0 20px;
}

.breadcrumb{
  font-size:14px;
  margin-bottom:20px;
  color:#DDD;
  text-shadow: 2px 2px #000;
}

.page-header h2{
  font-size:28px;
  margin-bottom:10px;
  text-shadow: 3px 3px #000;
}

/* PRODUCTS GRID */
.products{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:25px;
  margin-top: 40px;
}

/* PRODUCT CARD */
.product{
  background-image: url('cobblestone.png');
  background-repeat: repeat;
  padding: 20px;
  border: 4px solid #A8A8A8;
  border-style: outset;
  text-align:center;
}

.product img{
  width:100%;
  image-rendering: pixelated;
  border: 3px solid #363636;
  cursor:pointer;
}

.product h3{
  margin:15px 0 10px;
  font-size: 16px;
  color: #FFF;
  text-shadow: 2px 2px #000;
}

.price{
  font-weight:bold;
  margin-bottom:15px;
  font-size: 18px;
  color: #FFFF55; /* Zlatá barva jako XP */
  text-shadow: 2px 2px #000;
}

.order-btn{
  display:inline-block;
  background:#707070;
  color:white;
  padding:12px 18px;
  text-decoration:none;
  font-family: 'Press Start 2P', cursive;
  border: 4px solid #A8A8A8;
  border-style: outset;
  box-shadow: none;
}

.order-btn:active{
  border-style: inset;
}

/* LIGHTBOX */
.lightbox{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
  border: 4px solid #A8A8A8;
}

/* RESPONSIVE */
@media(max-width:900px){
  .products{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:500px){
  .products{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
  <h1>3DJV Craft</h1>
</header>

<div class="page">

  <div class="breadcrumb">
    Domov > Velikonoce
  </div>

  <div class="page-header">
    <div>
      <h2>Velikonoce</h2>
    </div>
  </div>

  <div class="products">

    <div class="product">
      
      <h3>Malý králík</h3>
      <div class="price">35 XP</div>
      <a class="order-btn" href="mailto:vaskoj@seznam.cz?subject=Chci vycraftit – Malý králík">Craftit!</a>
    </div>

    <div class="product">
      
      <h3>Velký králík</h3>
      <div class="price">45 XP</div>
      <a class="order-btn" href="mailto:vaskoj@seznam.cz?subject=Chci vycraftit – Velký králík">Craftit!</a>
    </div>
    
    <!-- Sem můžeš přidat další produkty -->

  </div>

</div>

<footer>
  <p>© 2026 3DJV Craft</p>
</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<script>
function openLightbox(src){
  document.getElementById("lightbox-img").src = src;
  document.getElementById("lightbox").style.display = "flex";
}
function closeLightbox(){
  document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
