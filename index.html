<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>3DJV – Velikonoce</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family: Arial, sans-serif;
  background:#f4f4f4;
  color:#333;
}

/* HEADER */
header{
  background:#111;
  color:white;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1{font-size:22px;}

nav a{
  color:white;
  text-decoration:none;
  margin-left:20px;
  font-weight:bold;
}

/* PAGE */
.page{
  max-width:1200px;
  margin:30px auto;
  padding:0 20px;
}

.breadcrumb{
  font-size:14px;
  margin-bottom:20px;
  color:#777;
}

.page-header{
  display:flex;
  justify-content:space-between;
  gap:30px;
  margin-bottom:40px;
}

.page-header h2{
  font-size:32px;
  margin-bottom:10px;
}

.category-image img{
  width:300px;
  border-radius:12px;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:25px;
}

.product{
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  text-align:center;
}

.product img{
  width:100%;
  border-radius:8px;
  cursor:pointer;
}

.product h3{
  margin:10px 0 5px;
}

.price{
  font-weight:bold;
  margin-bottom:10px;
}

.order-btn{
  display:inline-block;
  background:#ff7a00;
  color:white;
  padding:8px 14px;
  border-radius:6px;
  text-decoration:none;
  font-weight:bold;
}

/* LIGHTBOX */
.lightbox{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}

/* FOOTER */
footer{
  background:#111;
  color:white;
  text-align:center;
  padding:15px;
  margin-top:50px;
}

/* RESPONSIVE */
@media(max-width:900px){
  .page-header{flex-direction:column;}
  .products{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:500px){
  .products{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
  <h1>3DJV</h1>
  <nav>
    <a href="#">Domů</a>
    <a href="#">Velikonoce</a>
  </nav>
</header>

<div class="page">

  <div class="breadcrumb">
    Domů > Velikonoce
  </div>

  <div class="page-header">
    <div>
      <h2>Velikonoce</h2>
      <p>3D tištěné velikonoční dekorace a králíci.</p>
    </div>
    <div class="category-image">
      
    </div>
  </div>

  <div class="product">
  <img src="kralik.jpg" alt="Malý králík">

  <h3>Malý králík</h3>
  <div class="price">35 Kč</div>
  <a class="order-btn" href="mailto:vaskoj@seznam.cz?subject=Objednávka – Malý králík">Objednat</a>
</div>


    <div class="product">
      
      <h3>Velký králík</h3>
      <div class="price">45 Kč</div>
      <a class="order-btn" href="mailto:   vaskoj@seznam.cz ?subject=Objednávka – Velký králík">Objednat</a>
    </div>

    <div class="product">
      
      <h3>Králík XL</h3>
      <div class="price">60 Kč</div>
      <a class="order-btn" href="mailto:   vaskoj@seznam.cz ?subject=Objednávka – Králík XL">Objednat</a>
    </div>

  </div>

</div>

<footer>
  © 2026 3DJV
</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<script>
function openLightbox(src){
  document.getElementById("lightbox-img").src = src;
  document.getElementById("lightbox").style.display = "flex";
}

function closeLightbox(){
  document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
