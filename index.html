<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>3DJV – Velikonoce</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* RESET */
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

/* BODY */
body{
  font-family: Arial, sans-serif;
  background-image: url("äa.png");
  background-repeat: no-repeat;
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color:#333;
}

/* THINGIVERSE BUTTON */
.thingiverse-link{
  position:fixed;
  top:10px;
  left:10px;
  background:#ff6a00;
  color:white;
  padding:10px 15px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
  z-index:1000;
}

/* HEADER */
header{
  background:#111;
  color:white;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1{
  font-size:22px;
}

nav a{
  color:white;
  text-decoration:none;
  margin-left:20px;
  font-weight:bold;
}

/* PAGE */
.page{
  max-width:1200px;
  margin:30px auto;
  padding:20px;
  background: rgba(255,255,255,0.9);
  border-radius:12px;
}

.breadcrumb{
  font-size:14px;
  margin-bottom:20px;
  color:#777;
}

.page-header{
  display:flex;
  justify-content:space-between;
  gap:30px;
  margin-bottom:40px;
}

.page-header h2{
  font-size:32px;
  margin-bottom:10px;
}

.category-image img{
  width:300px;
  border-radius:12px;
}

/* PRODUCTS GRID */
.products{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:25px;
}

/* PRODUCT CARD */
.product{
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  text-align:center;
  transition:0.2s;
}

.product:hover{
  transform: scale(1.05);
}

.product img{
  width:100%;
  border-radius:8px;
  cursor:pointer;
  margin-bottom:10px;
}

.price{
  font-weight:bold;
  margin-bottom:10px;
}

.order-btn{
  display:inline-block;
  background:#ff7a00;
  color:white;
  padding:8px 14px;
  border-radius:6px;
  text-decoration:none;
  font-weight:bold;
}

/* LIGHTBOX */
.lightbox{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}

/* FOOTER */
footer{
  background:#111;
  color:white;
  text-align:center;
  padding:15px;
  margin-top:50px;
}

/* RESPONSIVE */
@media(max-width:900px){
  .page-header{
    flex-direction:column;
  }
  .products{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:500px){
  .products{
    grid-template-columns:1fr;
  }
}

</style>
</head>

<body>

<!-- THINGIVERSE ODKAZ -->
<a class="thingiverse-link" href="https://www.thingiverse.com" target="_blank">
Thingiverse
</a>

<header>
  <h1>3DJV</h1>
 <nav>
  <a href="index.html">Domů</a>
  <a href="velikonoce.html">Velikonoce</a>
</nav>
</header>

<div class="page">

  <div class="breadcrumb">
    Domů > Velikonoce
  </div>

  <div class="page-header">
    <div>
      <h2>Velikonoce</h2>
      <p>3D tištěné velikonoční dekorace a králíci.</p>
    </div>
    <div class="category-image">
      <img src="kralik.jpg">
    </div>
  </div>

  <div class="products">

    <div class="product">
      <img src="kralik.jpg" onclick="openLightbox(this.src)">
      <h3>Malý králík</h3>
      <div class="price">35 Kč</div>
      <a class="order-btn" href="mailto:vaskoj@seznam.cz?subject=Objednávka – Malý králík">Objednat</a>
    </div>

    <div class="product">
      <img src="jira.mp4.mp4" onclick="openLightbox(this.src)">
      <h3>Velký </h3>
      <div class="price">855 Kč</div>
      <a class="order-btn" href="mailto:vaskoj@seznam.cz?subject=Objednávka – Velký kokot">Objednat</a>
    </div>

    <div class="product">
      <img src="kralik23cm.png" onclick="openLightbox(this.src)">
      <h3>Kralik 23 cm</h3>
      <div class="price">125 Kč</div>
      <a class="order-btn" href="mailto:vaskoj@seznam.cz?subject=Objednávka – Králík 23 cm">Objednat</a>
    </div>
<div class="product">
      <img src="vaza.png" onclick="openLightbox(this.src)">
      <h3>Váza 25 cm</h3>
      <div class="price">180 Kč</div>
      <a class="order-btn" href="mailto:vaskoj@seznam.cz?subject=Objednávka – Králík set">Objednat</a>
    </div>
  </div>

</div>

<footer>
  © 2026 3DJV
</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<script>
function openLightbox(src){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightbox-img").src=src;
}

function closeLightbox(){
  document.getElementById("lightbox").style.display="none";
}
</script>

</body>
</html>
