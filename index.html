<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>3DJV – Velikonoce</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family: Arial, sans-serif;
  background:#f4f4f4;
  color:#333;
}

/* ===== HEADER ===== */
header{
  background:#111;
  color:white;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1{font-size:22px;}

nav a{
  color:white;
  text-decoration:none;
  margin-left:20px;
  font-weight:bold;
  cursor:pointer;
}

/* ===== PAGE ===== */
.page{
  max-width:1200px;
  margin:30px auto;
  padding:0 20px;
}

/* breadcrumb */
.breadcrumb{
  font-size:14px;
  margin-bottom:20px;
  color:#777;
}

/* title */
.page-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:30px;
  margin-bottom:40px;
}

.page-header h2{
  font-size:32px;
  margin-bottom:10px;
}

.page-header p{
  max-width:500px;
  color:#666;
}

/* category image */
.category-image img{
  width:300px;
  border-radius:12px;
}

/* ===== PRODUCTS ===== */
.products{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:25px;
}

.product{
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  text-align:center;
}

.product img{
  width:100%;
  border-radius:8px;
}

.product h3{
  margin:10px 0 5px;
}

.price{
  font-weight:bold;
  color:#000;
}

/* ===== FOOTER ===== */
footer{
  background:#111;
  color:white;
  text-align:center;
  padding:15px;
  margin-top:50px;
}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .page-header{
    flex-direction:column;
  }
  .category-image img{
    width:100%;
  }
  .products{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:500px){
  .products{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
  <h1>3DJV</h1>
  <nav>
    <a href="#">Domů</a>
    <a href="#">Velikonoce</a>
  </nav>
</header>

<div class="page">

  <div class="breadcrumb">
    Domů > Velikonoce
  </div>

  <div class="page-header">
    <div>
      <h2>Velikonoce</h2>
      <p>Dekorace a 3D tištěné výrobky s velikonoční tematikou. Ideální jako výzdoba nebo malý dárek.</p>
    </div>

    <div class="category-image">
      
    </div>
  </div>

  <div class="products">

    <div class="product">
      
      <h3>Malý králík</h3>
      <div class="price">35 Kč</div>
    </div>

    <div class="product">
      
      <h3>Velký králík</h3>
      <div class="price">45 Kč</div>
    </div>

    <div class="product">
      
      <h3>Králík XL</h3>
      <div class="price">60 Kč</div>
    </div>

    <div class="product">
      
      <h3>Králík barevný</h3>
      <div class="price">50 Kč</div>
    </div>

    <div class="product">
      
      <h3>Sada králíků</h3>
      <div class="price">90 Kč</div>
    </div>

    <div class="product">
      
      <h3>Velikonoční dekorace</h3>
      <div class="price">40 Kč</div>
    </div>

  </div>

</div>

<footer>
  © 2026 3DJV
</footer>

</body>
</html>
