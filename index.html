<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>3DJV</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body{
  font-family: Arial, sans-serif;
  background:#f4f4f4;
  color:#333;
}

/* ===== HEADER ===== */
header{
  background:#111;
  color:white;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1{
  font-size:22px;
}

nav a{
  color:white;
  text-decoration:none;
  margin-left:20px;
  font-weight:bold;
  cursor:pointer;
}

nav a:hover{
  text-decoration:underline;
}

/* ===== HERO ===== */
.hero{
  padding:60px 20px;
  text-align:center;
  background:white;
}

.hero h2{
  font-size:32px;
  margin-bottom:10px;
}

/* ===== VELIKONOCE SECTION ===== */
#velikonoce{
  display:none;
  padding:40px;
}

/* layout */
.vel-layout{
  display:flex;
  gap:30px;
  align-items:flex-start;
}

/* right image */
.vel-image{
  flex:1;
}

.vel-image img{
  width:100%;
  border-radius:12px;
}

/* products grid */
.products{
  flex:2;
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:20px;
}

.product{
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  text-align:center;
}

.product img{
  width:100%;
  border-radius:8px;
}

.price{
  font-weight:bold;
  margin-top:8px;
}

/* footer */
footer{
  background:#111;
  color:white;
  text-align:center;
  padding:15px;
  margin-top:40px;
}

/* responsive */
@media (max-width:900px){
  .vel-layout{
    flex-direction:column;
  }
  .products{
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width:500px){
  .products{
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header>
  <h1>3DJV</h1>
  <nav>
    <a onclick="showHome()">Domů</a>
    <a onclick="showEaster()">Velikonoce</a>
  </nav>
</header>

<section class="hero" id="home">
  <h2>Moderní 3D tištěné produkty</h2>
  <p>Kvalitní výrobky z 3D tiskárny</p>
</section>

<section id="velikonoce">
  <div class="vel-layout">

    <!-- PRODUCTS -->
    <div class="products">

      <div class="product">
        <img src="kralici.png">
        <p>Malý králík</p>
        <div class="price">35 Kč</div>
      </div>

      <div class="product">
        <img src="kralici.png">
        <p>Velký králík</p>
        <div class="price">45 Kč</div>
      </div>

      <!-- kopírováním přidáš další produkty -->
      <div class="product">
        <img src="kralici.png">
        <p>Králík – barva na přání</p>
        <div class="price">50 Kč</div>
      </div>

      <div class="product">
        <img src="kralici.png">
        <p>Králík XL</p>
        <div class="price">60 Kč</div>
      </div>

      <div class="product">
        <img src="kralici.png">
        <p>Králík sada</p>
        <div class="price">90 Kč</div>
      </div>

      <div class="product">
        <img src="kralici.png">
        <p>Králík dekorace</p>
        <div class="price">40 Kč</div>
      </div>

    </div>

    <!-- IMAGE -->
    <div class="vel-image">
      <img src="kralici.png">
    </div>

  </div>
</section>

<footer>
  © 2026 3DJV
</footer>

<script>
function showEaster(){
  document.getElementById("home").style.display="none";
  document.getElementById("velikonoce").style.display="block";
}

function showHome(){
  document.getElementById("velikonoce").style.display="none";
  document.getElementById("home").style.display="block";
}
</script>

</body>
</html>
