<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Print - 3DJV</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        /* Horní lišta */
        header {
            background-color: #1e1e1e;
            padding: 15px 0;
        }

        nav {
            max-width: 1000px;
            margin: auto;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: #00bcd4;
        }

        /* Hlavní obsah */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            margin-top: 0;
        }

        .card {
            background: #f9f9f9;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #1e1e1e;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #00bcd4;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #1e1e1e;
            color: white;
            margin-top: 40px;
        }

        /* Mobil */
        @media (max-width: 600px) {
            nav {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>

<body>

<header>
    <nav>
        <a href="/3Dprint/">Domů</a>
        <a href="/3Dprint/vanoce/">Vánoce</a>
        <a href="/3Dprint/velikonoce/">Velikonoce</a>
    </nav>
</header>

<div class="container">
    <h1>🎄 3D Tisk Modely</h1>
    <p>Vítej na webu s 3D modely ke stažení.</p>

    <div class="card">
        <h2>Vánoční modely</h2>
        <p>Najdeš zde vánoční dekorace a modely.</p>
        <a class="btn" href="/3Dprint/vanoce/">Otevřít</a>
    </div>

    <div class="card">
        <h2>Velikonoční modely</h2>
        <p>Modely s velikonoční tématikou.</p>
        <a class="btn" href="/3Dprint/velikonoce/">Otevřít</a>
    </div>

</div>

<footer>
    © 2026 3DJV | GitHub Pages
</footer>

</body>
</html>
