<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>3DJV – Velikonoce</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* RESET */
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

/* BODY */
body{
  font-family: Arial, sans-serif;
  background:#f0f0f0;
}

/* THINGIVERSE */
.thingiverse-link{
  position:fixed;
  top:10px;
  left:10px;
  background:#ff6a00;
  color:white;
  padding:10px 15px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
  z-index:1000;
}

/* NAV */
nav{
  background:#333;
  padding:15px;
  text-align:center;
}

nav a{
  color:white;
  text-decoration:none;
  margin:0 15px;
  font-weight:bold;
  font-size:18px;
}

nav a:hover{
  color:#ff7a00;
}

/* HEADER */
header{
  text-align:center;
  padding:30px;
}

/* VIDEO */
.video-box{
  text-align:center;
  margin:20px;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  padding:20px;
}

.product{
  background:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  transition:0.2s;
}

.product:hover{
  transform:scale(1.05);
}

.product img{
  width:100%;
  border-radius:8px;
  cursor:pointer;
}

.price{
  font-weight:bold;
  margin:10px;
}

.order-btn{
  background:#ff7a00;
  color:white;
  padding:8px 12px;
  text-decoration:none;
  border-radius:6px;
}

/* LIGHTBOX */
.lightbox{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
}

</style>
</head>

<body>

<a class="thingiverse-link" href="https://www.thingiverse.com" target="_blank">
Thingiverse
</a>

<nav>
  <a href="#">Domů</a>
  <a href="#">Velikonoce</a>
</nav>

<header>
  <h1>3DJV</h1>
  <p>3D tištěné výrobky</p>
</header>

<!-- VIDEO -->
<div class="video-box">
  <video width="200" height="200" controls>
    <source src="jira.mp4.mp4" type="video/mp4">
  </video>
</div>

<!-- PRODUKTY -->
<div class="products">

  <div class="product">
    <img src="kralik.jpg" onclick="openLightbox(this.src)">
    <h3>Malý králík</h3>
    <div class="price">35 Kč</div>
    <a class="order-btn" href="#">Objednat</a>
  </div>

  <div class="product">
    <img src="kralik.jpg" onclick="openLightbox(this.src)">
    <h3>Velký králík</h3>
    <div class="price">45 Kč</div>
    <a class="order-btn" href="#">Objednat</a>
  </div>

  <div class="product">
    <img src="kralik.jpg" onclick="openLightbox(this.src)">
    <h3>Králík set</h3>
    <div class="price">80 Kč</div>
    <a class="order-btn" href="#">Objednat</a>
  </div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<script>
function openLightbox(src){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightbox-img").src=src;
}

function closeLightbox(){
  document.getElementById("lightbox").style.display="none";
}
</script>

</body>
</html>
